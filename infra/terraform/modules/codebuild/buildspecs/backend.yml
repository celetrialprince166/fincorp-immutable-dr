version: 0.2

# ===========================================================================
# FinCorp secure build — BACKEND tier (Django/pip)
# Same four securing-supply-chain controls as the frontend buildspec:
#   1. CodeArtifact is the ONLY dependency source (pip index-url + token below).
#   2. ECR IMMUTABLE tags  -> tag by git short SHA, never :latest.
#   3. Scan-on-push        -> enabled on the repo (Terraform).
#   4. The gate            -> post_build EXITS 1 on any HIGH/CRITICAL finding.
#
# Env vars injected by the CodeBuild project (Terraform):
#   AWS_DEFAULT_REGION, ACCOUNT_ID, ECR_REPO (fincorp-backend),
#   CA_DOMAIN, CA_DOMAIN_OWNER, CA_PIP_REPO, APP_DIR (apps/backend)
# ===========================================================================

env:
  shell: bash

phases:
  pre_build:
    commands:
      - set -euo pipefail
      - SHA="$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-$CODEBUILD_BUILD_NUMBER}" | cut -c1-7)"
      - echo "Image tag (immutable, SHA-based) = $SHA"
      - REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - IMAGE_URI="${REGISTRY}/${ECR_REPO}:${SHA}"

      # --- Control #1: authenticate pip to CodeArtifact (short-lived token) ----
      # Render a pip.conf whose index-url embeds the token + CodeArtifact pip repo
      # endpoint. EVERY pip install now proxies through CodeArtifact, no PyPI.
      - echo "Fetching CodeArtifact auth token..."
      - |
        CA_TOKEN="$(aws codeartifact get-authorization-token \
          --domain "$CA_DOMAIN" --domain-owner "$CA_DOMAIN_OWNER" \
          --query authorizationToken --output text --duration-seconds 43200)"
      - |
        CA_PIP_ENDPOINT="$(aws codeartifact get-repository-endpoint \
          --domain "$CA_DOMAIN" --domain-owner "$CA_DOMAIN_OWNER" \
          --repository "$CA_PIP_REPO" --format pypi \
          --query repositoryEndpoint --output text)"
      # CodeArtifact pip endpoint ends in /simple/ ; inject aws:TOKEN@ for basic auth.
      - CA_PIP_AUTHED="$(echo "$CA_PIP_ENDPOINT" | sed -e "s#^https://#https://aws:${CA_TOKEN}@#")"
      - |
        cat > pip.conf <<EOF
        [global]
        index-url = ${CA_PIP_AUTHED}simple/
        EOF
      - echo "Rendered pip.conf pointing pip at CodeArtifact ($CA_PIP_REPO)."

      - echo "Logging in to ECR ($REGISTRY)..."
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$REGISTRY"

  build:
    commands:
      - set -euo pipefail
      - echo "Building backend image $IMAGE_URI"
      # BuildKit secret -> pip consumes the token via /etc/pip.conf, never layered.
      - |
        DOCKER_BUILDKIT=1 docker build \
          --secret id=pipconf,src=pip.conf \
          -t "$IMAGE_URI" \
          -f "${APP_DIR}/Dockerfile" \
          "${APP_DIR}"
      - echo "Pushing $IMAGE_URI (IMMUTABLE repo — this tag can never be overwritten)"
      - docker push "$IMAGE_URI"

  post_build:
    commands:
      - set -euo pipefail
      # =====================================================================
      # THE GATE (securing-supply-chain control #4) — non-negotiable.
      # =====================================================================
      # Poll scan status directly (the `ecr wait` waiter aborts on the transient
      # ScanNotFoundException that occurs before scan-on-push registers). Tolerate
      # PENDING/ScanNotFound by retrying; fail closed on FAILED or timeout.
      - |
        echo "Polling ECR scan status for ${ECR_REPO}:${SHA}..."
        SCAN_STATUS="PENDING"
        for i in $(seq 1 40); do
          SCAN_STATUS="$(aws ecr describe-image-scan-findings \
            --repository-name "$ECR_REPO" --image-id imageTag="$SHA" \
            --region "$AWS_DEFAULT_REGION" \
            --query 'imageScanStatus.status' --output text 2>/dev/null || echo PENDING)"
          echo "  attempt $i: status=$SCAN_STATUS"
          case "$SCAN_STATUS" in
            COMPLETE) break;;
            FAILED) echo "ECR scan FAILED for ${ECR_REPO}:${SHA}"; exit 1;;
          esac
          sleep 15
        done
        if [ "$SCAN_STATUS" != "COMPLETE" ]; then
          echo "Scan did not COMPLETE within timeout (last=$SCAN_STATUS)"; exit 1
        fi
      # The human-readable summary (echoed for evidence). NOTE: ECR basic scanning
      # frequently leaves imageScanFindingsSummary.findingSeverityCounts EMPTY/null
      # even when the per-finding list contains HIGH/CRITICAL items — so the GATE
      # must NOT trust the summary. We echo it for context only.
      - |
        COUNTS="$(aws ecr describe-image-scan-findings \
          --repository-name "$ECR_REPO" --image-id imageTag="$SHA" \
          --region "$AWS_DEFAULT_REGION" \
          --query 'imageScanFindingsSummary.findingSeverityCounts' --output json || echo null)"
      - echo "findingSeverityCounts (summary, informational) -> $COUNTS"
      # >>> THRESHOLD ENFORCED HERE — count HIGH+CRITICAL from the AUTHORITATIVE
      #     per-finding list, paging through all results. High + Critical must be ZERO. <<<
      - |
        BLOCKERS=0
        NEXT=""
        while : ; do
          if [ -n "$NEXT" ]; then
            PAGE="$(aws ecr describe-image-scan-findings \
              --repository-name "$ECR_REPO" --image-id imageTag="$SHA" \
              --region "$AWS_DEFAULT_REGION" --max-results 1000 --next-token "$NEXT" \
              --output json)"
          else
            PAGE="$(aws ecr describe-image-scan-findings \
              --repository-name "$ECR_REPO" --image-id imageTag="$SHA" \
              --region "$AWS_DEFAULT_REGION" --max-results 1000 --output json)"
          fi
          N="$(echo "$PAGE" | jq '[.imageScanFindings.findings[]? | select(.severity=="HIGH" or .severity=="CRITICAL")] | length')"
          BLOCKERS=$((BLOCKERS + N))
          NEXT="$(echo "$PAGE" | jq -r '.nextToken // empty')"
          [ -z "$NEXT" ] && break
        done
        echo "HIGH/CRITICAL findings counted from per-finding list = $BLOCKERS"
        if [ "$BLOCKERS" -gt 0 ]; then
          echo "GATE FAILED: $BLOCKERS HIGH/CRITICAL finding(s) in ${ECR_REPO}:${SHA}. Blocking the pipeline."
          exit 1
        fi
      - echo "GATE PASSED - no HIGH/CRITICAL findings. Immutable image ${IMAGE_URI} is cleared."
